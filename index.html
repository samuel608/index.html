<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Feliz Cumpleaños! 🎂🎉</title>

<!-- Open Graph / WhatsApp Preview -->
<meta property="og:type"        content="website">
<meta property="og:title"       content="🎂 ¡Tienes un regalo sorpresa! 🎉">
<meta property="og:description" content="Toca para abrir tu regalo de cumpleaños 🎈✉️">
<meta property="og:image"       content="https://samuel608.github.io/preview.jpg">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="🎂 ¡Tienes un regalo sorpresa! 🎉">
<meta name="twitter:description" content="Toca para abrir tu regalo de cumpleaños 🎈✉️">
<meta name="twitter:image"       content="https://samuel608.github.io/preview.jpg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FFF176;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Bangers', cursive;
    cursor: pointer;
    user-select: none;
  }

  /* ── HALFTONE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #00000018 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── BALLOONS ── */
  .balloon-wrap {
    position: fixed;
    bottom: -120px;
    z-index: 1;
    animation: rise linear infinite;
  }
  .balloon {
    width: 60px;
    height: 75px;
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    border: 6px solid #000;
    position: relative;
    box-shadow: inset -10px -8px 0 rgba(0,0,0,0.12), inset 8px 6px 0 rgba(255,255,255,0.35);
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 18px;
    background: #000;
  }
  .balloon::before {
    content: '';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid #000;
  }
  .b-red   { background: #E53935; }
  .b-blue  { background: #1E88E5; }
  .b-yellow{ background: #FDD835; }
  .b-green { background: #43A047; }
  .b-pink  { background: #E91E63; }

  @keyframes rise {
    0%   { transform: translateY(0)   translateX(0); opacity: 1; }
    50%  { transform: translateY(-50vh) translateX(15px); }
    100% { transform: translateY(-110vh) translateX(-10px); opacity: 0; }
  }

  /* ── SCENE ── */
  .scene {
    perspective: 900px;
    position: relative;
    z-index: 10;
  }

  /* ── ENVELOPE ── */
  .envelope {
    width: min(340px, 88vw);
    height: min(230px, 58vw);
    position: relative;
    transform-style: preserve-3d;
    animation: float 3s ease-in-out infinite;
    transition: transform 0.12s ease-out;
  }

  @keyframes float {
    0%,100% { transform: translateY(0px) rotateX(0deg); }
    50%      { transform: translateY(-14px) rotateX(2deg); }
  }

  .envelope.opened { animation: none !important; }

  /* body */
  .env-body {
    width: 100%;
    height: 100%;
    background: #EF5350;
    border: 6px solid #000;
    border-radius: 6px;
    position: absolute;
    box-shadow: 6px 6px 0 #000;
    overflow: hidden;
  }

  /* diagonal side flaps (decoration lines) */
  .env-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom-right, transparent calc(50% - 3px), #000 calc(50% - 3px), #000 calc(50% + 3px), transparent calc(50% + 3px)),
      linear-gradient(to bottom-left,  transparent calc(50% - 3px), #000 calc(50% - 3px), #000 calc(50% + 3px), transparent calc(50% + 3px));
  }

  /* bottom triangle */
  .env-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 60%;
    background: #F44336;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    border-top: 6px solid #000;
    z-index: 2;
  }

  /* top flap */
  .env-flap {
    width: 100%;
    height: 55%;
    background: #EF5350;
    position: absolute;
    top: 0; left: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border-bottom: 6px solid #000;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.7s cubic-bezier(.4,1.6,.5,1);
    z-index: 5;
    backface-visibility: hidden;
  }

  .envelope.opened .env-flap {
    transform: rotateX(-170deg);
  }

  /* seal dot */
  .env-seal {
    position: absolute;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 38px; height: 38px;
    background: #FDD835;
    border-radius: 50%;
    border: 5px solid #000;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 3px 3px 0 #000;
    transition: opacity 0.3s;
  }
  .envelope.opened .env-seal { opacity: 0; pointer-events: none; }

  /* ── LETTER ── */
  .letter {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%) translateY(0px);
    width: 88%;
    height: 82%;
    background: #FFFDE7;
    border: 6px solid #000;
    border-radius: 6px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.8s cubic-bezier(.2,1.4,.4,1) 0.3s, opacity 0.5s 0.3s;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .envelope.opened .letter {
    transform: translateX(-50%) translateY(-170%);
    opacity: 1;
  }

  .letter-text {
    font-family: 'Bangers', cursive;
    font-size: clamp(22px, 6vw, 36px);
    color: #000;
    text-align: center;
    line-height: 1.1;
    text-shadow: 3px 3px 0 #FDD835;
    padding: 0 10px;
    letter-spacing: 1px;
  }

  .letter-stars {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    font-size: clamp(18px, 4vw, 26px);
  }

  .letter::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(transparent, transparent 22px, #BBDEFB 22px, #BBDEFB 24px);
    opacity: 0.5;
  }

  /* ── HINT TEXT ── */
  .hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Comic Neue', cursive;
    font-size: 15px;
    font-weight: 700;
    color: #000;
    background: #FDD835;
    border: 4px solid #000;
    padding: 6px 18px;
    border-radius: 30px;
    box-shadow: 4px 4px 0 #000;
    z-index: 20;
    animation: blink 1.4s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes blink {
    0%,100% { opacity: 1; transform: translateX(-50%) scale(1); }
    50%      { opacity: .6; transform: translateX(-50%) scale(.95); }
  }
  .hint.hidden { display: none; }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed;
    top: -20px;
    width: 10px; height: 10px;
    border: 3px solid #000;
    z-index: 50;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── SPEECH BUBBLE ── */
  .bubble {
    position: fixed;
    z-index: 60;
    background: #fff;
    border: 5px solid #000;
    border-radius: 16px;
    padding: 12px 22px;
    font-family: 'Bangers', cursive;
    font-size: clamp(24px, 7vw, 44px);
    color: #000;
    text-shadow: 3px 3px 0 #FDD835;
    box-shadow: 6px 6px 0 #000;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.5s cubic-bezier(.3,1.6,.4,1) 1s;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }
  .bubble.show { transform: translate(-50%, -50%) scale(1); }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #000;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 16px solid #fff;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- BALLOONS -->
<div id="balloons"></div>

<!-- SPEECH BUBBLE -->
<div class="bubble" id="bubble">🎉 ¡FELIZ CUMPLEAÑOS! 🎉</div>

<!-- SCENE -->
<div class="scene">
  <div class="envelope" id="envelope">
    <div class="env-body"></div>
    <div class="env-bottom"></div>
    <div class="letter" id="letter">
      <span class="letter-text">🎂 ¡FELIZ<br>CUMPLEAÑOS! 🎂</span>
      <div class="letter-stars">🌟 🎈 🌟 🎈 🌟</div>
    </div>
    <div class="env-flap" id="flap"></div>
    <div class="env-seal" id="seal">⭐</div>
  </div>
</div>

<!-- HINT -->
<div class="hint" id="hint">👆 ¡Toca el sobre!</div>

<script>
  // ── BALLOONS ──
  const colors = ['b-red','b-blue','b-yellow','b-green','b-pink'];
  const balloonContainer = document.getElementById('balloons');

  function spawnBalloon() {
    const wrap = document.createElement('div');
    wrap.className = 'balloon-wrap';
    const b = document.createElement('div');
    b.className = 'balloon ' + colors[Math.floor(Math.random() * colors.length)];
    wrap.appendChild(b);
    wrap.style.left = Math.random() * 100 + 'vw';
    const dur = 6 + Math.random() * 6;
    wrap.style.animation = `rise ${dur}s linear forwards`;
    wrap.style.bottom = '-120px';
    balloonContainer.appendChild(wrap);
    setTimeout(() => wrap.remove(), dur * 1000);
  }

  for (let i = 0; i < 8; i++) setTimeout(spawnBalloon, i * 800);
  setInterval(spawnBalloon, 1400);

  // ── TILT ON MOUSE / TOUCH ──
  const envelope = document.getElementById('envelope');
  let opened = false;

  document.addEventListener('mousemove', e => {
    if (opened) return;
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    const rx = ((e.clientY - cy) / cy) * 12;
    const ry = ((e.clientX - cx) / cx) * -12;
    envelope.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  });

  document.addEventListener('touchmove', e => {
    if (opened) return;
    const t = e.touches[0];
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    const rx = ((t.clientY - cy) / cy) * 10;
    const ry = ((t.clientX - cx) / cx) * -10;
    envelope.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  }, { passive: true });

  document.addEventListener('mouseleave', () => {
    if (!opened) envelope.style.transform = '';
  });

  // ── OPEN ON CLICK / TAP ──
  envelope.addEventListener('click', openEnvelope);
  envelope.addEventListener('touchend', e => { e.preventDefault(); openEnvelope(); }, { passive: false });

  function openEnvelope() {
    if (opened) return;
    opened = true;
    envelope.classList.add('opened');
    envelope.style.transform = '';
    document.getElementById('hint').classList.add('hidden');
    spawnConfetti();
    setTimeout(() => {
      document.getElementById('bubble').classList.add('show');
    }, 600);
  }

  // ── CONFETTI ──
  const confettiColors = ['#E53935','#1E88E5','#FDD835','#43A047','#E91E63','#FF7043','#7B1FA2'];
  function spawnConfetti() {
    for (let i = 0; i < 55; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.width  = (8 + Math.random() * 8) + 'px';
        c.style.height = (8 + Math.random() * 8) + 'px';
        const dur = 2 + Math.random() * 2;
        c.style.animation = `confettiFall ${dur}s linear forwards`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), dur * 1000);
      }, i * 55);
    }
  }
</script>
</body>
</html>
